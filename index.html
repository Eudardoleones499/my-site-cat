<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход...</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; text-align: center; border: 1px solid #333; padding: 30px; border-radius: 15px; background: #050505; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #00f2ea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; background: #fe2c55; color: #fff; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader"></div>
        <div style="font-size: 18px; margin-bottom: 10px;">Проверка завершена</div>
        <div style="font-size: 14px; color: #ccc;">Нажмите кнопку ниже, чтобы продолжить просмотр в браузере.</div>
        <a href="#" id="main-link" class="btn">ПРОДОЛЖИТЬ</a>
    </div>

    <script>
        var targetUrl = "https://www.google.com"; // ТВОЯ ССЫЛКА
        var link = document.getElementById('main-link');
        
        var isAndroid = /Android/i.test(navigator.userAgent);
        var intentUrl = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";

        // Вместо авто-вылета ставим вылет ПО КЛИКУ (это не палится фильтром)
        link.onclick = function() {
            if (isAndroid) {
                window.location.href = intentUrl;
            } else {
                window.location.href = targetUrl;
            }
            return false;
        };
    </script>
</body>
</html>
